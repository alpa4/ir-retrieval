index:
  docs_path: /app/data/documents
  state_path: /app/state/index_state.json

splitting:
  class: recursive
  chunk_size: 1000
  chunk_overlap: 100

embeddings:
  model_name: Qwen/Qwen3-Embedding-0.6B
  vector_size: 1024
  device: null
  batch_size: 32

cross_encoder:
  enabled_by_default: true
  model_name: BAAI/bge-reranker-v2-m3
  device: null
  batch_size: 16

sparse:
  enabled: true
  model_name: Qdrant/bm25

doc_summary:
  enabled: true
  model: "qwen"
  temperature: 0.2
  max_tokens: 1000
  prompt_version: v1
  concurrency: 16

qdrant:
  host: qdrant
  port: 6333

search_defaults:
  top_k_doc: 100
  top_k_dense: 40
  top_k_sparse: 40
  final_top_k: 20
  mode: default
